name: Publicar Flutter Web en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Instalar dependencias
        run: flutter pub get

      - name: Analizar proyecto
        run: flutter analyze

      - name: Compilar web
        run: flutter build web --release --base-href "/${GITHUB_REPOSITORY#*/}/"

      - name: Desactivar Jekyll
        run: touch build/web/.nojekyll

      - name: Preparar artefacto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
